  text: "Apple just made Docker Desktop optional on Mac. \n\nAnd it is completely\
    \ free.\n\nThis is apple/container. 26.5k stars no Github.\n\nYou can now run\
    \ Linux containers natively on your Mac without installing Docker Desktop, without\
    \ a background daemon hogging your RAM, and without paying $21 a month per developer\
    \ for a commercial license.\n\nHere is what it does:\n\n→ Runs Linux containers\
    \ as lightweight VMs directly on Apple Silicon using macOS 26 virtualization\n\
    → Fully OCI compatible. Pull any image from Docker Hub, GitHub Container Registry\
    \ or anywhere else\n→ Written in Swift and optimised specifically for Apple Silicon.\
    \ Faster and lighter than anything Docker Desktop does on Mac\n→ Standard container\
    \ CLI syntax. If you know Docker commands you already know how to use this\n→\
    \ Push images you build to any standard container registry and run them anywhere\n\
    \nDocker Desktop charges $21 per developer per month for commercial use. Apple's\
    \ version costs nothing and ships as open source under Apache-2.0.\n\nMicrosoft\
    \ made Docker Desktop optional on Windows with WSL Containers last month.\n\n\
    Apple just did the same on Mac.\n\nDocker is not going anywhere. But the era of\
    \ paying for a GUI wrapper around containers on your own machine is quietly ending.\n\
    \nRepo here: https://t.co/uFJ867sul6"
