  articleTitle: wtf is Crabbox & how it lets you ship 10x more PRs
  articleText: "I used to manage only 2 or 3 Claude Code sessions at the same time.\n\
    \nSince April this year that number went up fast, especially after we set up loops.\
    \ At any given time now, I have at least 5 to 10 sessions running in parallel.\
    \ Most of them I never prompted directly: they come from loops that find issues,\
    \ pick up work, verify changes, and open PRs on their own.\n\nThat produces a\
    \ volume of PRs that was not possible before. But it also creates a new problem.\
    \ Every one of those PRs has to be reviewed and shipped to real customers, and\
    \ each one carries the risk of breaking something.\n\nSo the bottleneck has moved.\n\
    \n> It is no longer writing the code. It is getting code merged into the codebase.\n\
    \nThis post is about the part of the harness that fixes that, and an introduction\
    \ to Peter's new side project Crabbox and how it resolves this.\n\n## Agent needs\
    \ its own box to verify work\n\nIt is common practice now to have an agent spawn\
    \ a sub-agent that tests the work with Playwright CLI and records evidence: a\
    \ screenshot, or a video of the whole flow, attached to the PR. That is what makes\
    \ an agent's work easy to trust and merge. Instead of taking its word for it,\
    \ I can see it working.\n\nThis was fine when I ran 3 or 4 agents. It breaks quickly\
    \ once you have many parallel sessions, because they end up testing against the\
    \ same environment and conflicting with each other.\n\nTo verify, each agent needs\
    \ the dev server actually running on its own code. Even if you give each ticket\
    \ its own git worktree, that only isolates writing code. Running the app many\
    \ times over, locally, does not scale:\n\n- Ports are often hard-coded, for good\
    \ reasons. The second instance cannot start.\n\n- One laptop has one Docker daemon,\
    \ one database, one OS. Every \"isolated\" session is secretly sharing them. One\
    \ agent trying a new schema can break every other session at once.\n\n- A real\
    \ production stack also eats RAM and CPU. Five of them will not fit.\n\nThe only\
    \ thing that scales is to stop running everything on one laptop.\n\n> Each agent\
    \ should get its own isolated environment in the cloud: its own machine, its own\
    \ database, its own dev server. The sandboxes do not touch each other.\n\n @SToneoneX\
    \ actually hand-rolled a version of this for our platform @SuperDesignDev which\
    \ worked like magic. We ran it on Fly.io: a Firecracker VM with the full stack\
    \ inside (local Supabase via docker-in-docker, Redis, and the dev servers), booted\
    \ from a base image with a persistent volume. We added an on-box orchestrator\
    \ to bring it all up, a CDP browser to drive it, suspend and resume so a box came\
    \ back hot in about 3 seconds, and an idle watchdog that powered it off after\
    \ 45 minutes so we never paid for a box someone forgot to stop. It unlocked a\
    \ lot.\n\nBut it still had a sharp edge, To get code onto the box, it pulled the\
    \ branch from GitHub with git fetch. You had to push first. Uncommitted working-tree\
    \ changes could not be verified at all.\n\nSo the moment an agent tested on the\
    \ box, found a bug, and fixed it on your local machine, you were stuck. You had\
    \ a dirty file locally, and a box that only knew about what was already pushed.\n\
    \nThe normal commit, push, CI flow does not work well here. Your repo fills up\
    \ with junk commits. And you do not want to rebuild the box from scratch every\
    \ time either.\n\nWhat you actually want is simple.\n\n> Make a change, and re-test\
    \ in seconds.\n\nThat is where we saw Peter's new side project, Crabbox.: https://github.com/openclaw/crabbox\n\
    \n## How Crabbox works\n\nCrabbox lets an agent warm up a box in the cloud, sync\
    \ the dirty diff from your local worktree, and run the test in real time. Three\
    \ commands:\n\n1.crabbox warmup spins up a box.\n\n2. crabbox run -- <command>\
    \ runs any command, as if it were local, but on the cloud box. Every run first\
    \ syncs the diff from your machine. You do not even have to commit. As long as\
    \ the folder is git-initialized, it syncs all your uncommitted changes, then runs.\n\
    \n3. crabbox stop turns the box off and deletes it.\n\nThat is the whole loop.\
    \ After an agent finishes a task it can: warmup, run setup to install deps and\
    \ start the dev server, run your tests or drive Playwright itself, and if it hits\
    \ a bug, fix it locally and run again. The latest change syncs automatically,\
    \ so it always tests the newest version. Then stop.\n\nThe \"fix locally, run\
    \ again, latest change auto-syncs\" part is the bit that makes it click. No commit\
    \ spam, no box rebuilds, and you are always testing the latest version in seconds.\n\
    \n## The setup is three files\n\n1. A Dockerfile that encapsulates everything\
    \ your local machine has: Node, your package manager, any CLIs (in my case the\
    \ Supabase CLI), a browser. You can prompt an agent to write it.\n\n2. A .crabbox.yaml.\
    \ This is the config for every Crabbox command. It defines the sandbox provider,\
    \ which files to skip syncing, and which environment variables to forward.\n\n\
    3. A setup.sh, so the agent runs one script to bring the whole dev server up,\
    \ instead of stepping through commands by hand.\n\nOn the sync excludes: you usually\
    \ do not need to list node_modules, .next, or .env*, because they are already\
    \ gitignored. The real value is excluding heavy folders you do not need on the\
    \ box (mine has an evidence folder). The environment variables you list get pushed\
    \ straight to the box over the encrypted SSH connection. They never go through\
    \ a broker, and they are never written into the synced repo. Relatively safe.\n\
    \nThe whole thing is a handful of files. This is the entire footprint that makes\
    \ a codebase verifiable by any agent in an isolated cloud box:\n\nis a small convenience\
    \ that wraps the warmup-and-poll dance into one command. And the skill is what\
    \ lets me just say \"test this via Crabbox\" and have the agent know the whole\
    \ sequence on its own: warm a box, run setup, drive Playwright, bring evidence\
    \ back, stop.The three files above do the real work.cbx.sh\n\nThat is the entire\
    \ change. The app itself stays untouched.\n\n## Getting evidence back out\n\n\
    Crabbox has good primitives for proof:\n\n- --artifact-glob on any run auto-downloads\
    \ matching files after the command finishes. This is useful when the agent writes\
    \ an e2e script that drops a video or screenshot. The file lands back on your\
    \ machine automatically.\n\n- crabbox artifacts collect takes a screenshot of\
    \ the box's screen. artifacts video screen-records the session.\n\n- crabbox artifacts\
    \ publish uploads straight to your S3 bucket, so you can drop the image or video\
    \ inline as a PR comment.\n\nOne note from experience: which of these are available\
    \ depends on the provider. More on that at the end.\n\n## One flag worth knowing:\
    \ --no-sync\n\nBy default, every crabbox run first syncs your dirty diff to the\
    \ box. That is the whole point. But you do not always want it.\n\nUse --no-sync\
    \ whenever the command only reads or drives a box that already has your code,\
    \ and you have not changed anything since the last run:\n\n- reading a file, tailing\
    \ logs, checking status\n\n- driving Playwright CLI in the box (you are testing\
    \ code that is already there, you do not want every click to re-upload)\n\n- polling\
    \ a long-running command, where a resync mid-run can stomp on files underneath\
    \ it\n\n> Rule of thumb: sync when you changed code and want to test the new version.\
    \ Use no-sync for anything that just reads or drives the running box.\n\n## /Crabbox-setup\
    \ skill\n\nI packaged all of this into a skill: the Crabbox testing suite, plus\
    \ the wider codebase harness it plugs into. It is open, and you can grab it here:\n\
    \nhttps://github.com/AI-Builder-Club/skills\n\nPoint it at your repo and it scaffolds\
    \ the pieces above (the Dockerfile, .crabbox.yaml, setup.sh, and the crabbox-test\
    \ skill), adapted to your stack.\n\nAnd if you want the full walkthrough, we have\
    \ step-by-step workshop goes into how this fits into running compounding loops\
    \ at @aibuilderclub_ "
