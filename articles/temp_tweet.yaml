  text: 'great article.

    However Crabbox is a tool created by Peter to parallelize tests, isn’t the best
    tool to run parallel agents.

    Agentbox on the other end gives you claude settings/oauth/skills migration, local
    tunnel, boxes with chromium and web screen sharing, and keep your git credentials
    on your pc.


    Also provides tools to orchestrate multiple agents from another agent, like queue,
    wait-for input-needed.


    try it with npm -g i @madarco/agentbox'
