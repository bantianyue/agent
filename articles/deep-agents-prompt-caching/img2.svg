<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="530" viewBox="0 0 960 530" xmlns="http://www.w3.org/2000/svg">
  <title>The token cost of a conversation with prompt caching</title>
  <defs>
    <style>
      text { font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7FC8FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="530" fill="#030710"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="14" font-weight="600" fill="#C8DDF0">The token cost of a conversation with prompt caching</text>

  <!--
    LEFT: Turn 1 (no cache yet)
    Rows: System Prompt + Tools + Skills + ellipsis
    Height: 14 + 20 + 10 + 3×(52+12) + 28 + 14 = 278
  -->
  <rect x="28" y="50" width="268" height="278" rx="12" fill="#0B1120" stroke="#1A2740" stroke-width="1"/>
  <text x="40" y="72" font-size="11" font-weight="500" fill="#C8DDF0">5,200 tokens</text>
  <rect x="40" y="82" width="244" height="48" rx="7" fill="#161F33" stroke="#1A2740" stroke-width="0.5"/>
  <text x="162" y="111" text-anchor="middle" font-size="13" font-weight="500" fill="#C8DDF0">System Prompt</text>
  <rect x="40" y="142" width="244" height="48" rx="7" fill="#161F33" stroke="#1A2740" stroke-width="0.5"/>
  <text x="162" y="171" text-anchor="middle" font-size="13" font-weight="500" fill="#C8DDF0">Tools</text>
  <rect x="40" y="202" width="244" height="48" rx="7" fill="#161F33" stroke="#1A2740" stroke-width="0.5"/>
  <text x="162" y="231" text-anchor="middle" font-size="13" font-weight="500" fill="#C8DDF0">Skills</text>
  <text x="162" y="277" text-anchor="middle" font-size="14" fill="#6B8299">···</text>

  <!-- box bottom=328, user msg top=358 -->
  <text x="162" y="345" text-anchor="middle" font-size="11" fill="#6B8299">+ 3 tokens</text>
  <rect x="40" y="358" width="244" height="38" rx="7" fill="#112338" stroke="#2A5A80" stroke-width="0.5"/>
  <text x="162" y="381" text-anchor="middle" font-size="13" font-weight="500" fill="#7FC8FF">Good morning!</text>


  <!--
    RIGHT: Turn 2 (cached)
    Rows: System Prompt (cached) + Tools (cached) + Skills (cached) + ellipsis + Good morning! (cached, inside)
    Height: 14 + 24 + 10 + 3×(52+12) + 28 + 8 + 38 + 14 = 332
    What's the weather? OUTSIDE
  -->
  <rect x="372" y="50" width="268" height="332" rx="12" fill="#0B1120" stroke="#1A2740" stroke-width="1"/>

  <!-- cached badge -->
  <rect x="384" y="58" width="156" height="22" rx="5" fill="#0E1E0A" stroke="#1A4028" stroke-width="0.5"/>
  <text x="462" y="73" text-anchor="middle" font-size="11" font-weight="500" fill="#E3FF8F">5,203 tokens cached</text>

  <!-- System Prompt cached -->
  <rect x="384" y="86" width="244" height="48" rx="7" fill="#0B1A10" stroke="#163322" stroke-width="0.5"/>
  <text x="506" y="108" text-anchor="middle" font-size="13" font-weight="500" fill="#A0C8A8">System Prompt</text>
  <text x="506" y="124" text-anchor="middle" font-size="9" font-weight="700" fill="#4A8060" letter-spacing="0.08em">CACHED</text>

  <!-- Tools cached -->
  <rect x="384" y="146" width="244" height="48" rx="7" fill="#0B1A10" stroke="#163322" stroke-width="0.5"/>
  <text x="506" y="168" text-anchor="middle" font-size="13" font-weight="500" fill="#A0C8A8">Tools</text>
  <text x="506" y="184" text-anchor="middle" font-size="9" font-weight="700" fill="#4A8060" letter-spacing="0.08em">CACHED</text>

  <!-- Skills cached -->
  <rect x="384" y="206" width="244" height="48" rx="7" fill="#0B1A10" stroke="#163322" stroke-width="0.5"/>
  <text x="506" y="228" text-anchor="middle" font-size="13" font-weight="500" fill="#A0C8A8">Skills</text>
  <text x="506" y="244" text-anchor="middle" font-size="9" font-weight="700" fill="#4A8060" letter-spacing="0.08em">CACHED</text>

  <!-- ellipsis -->
  <text x="506" y="277" text-anchor="middle" font-size="14" fill="#6B8299">···</text>

  <!-- Good morning! INSIDE (cached) — y=286 -->
  <rect x="384" y="286" width="244" height="38" rx="7" fill="#0B1A10" stroke="#163322" stroke-width="0.5"/>
  <text x="506" y="309" text-anchor="middle" font-size="13" font-weight="500" fill="#A0C8A8">Good morning!</text>

  <!-- box bottom=382, user msg top=412 -->
  <text x="506" y="399" text-anchor="middle" font-size="11" fill="#6B8299">+ 3 tokens</text>
  <rect x="384" y="412" width="244" height="38" rx="7" fill="#112338" stroke="#2A5A80" stroke-width="0.5"/>
  <text x="506" y="435" text-anchor="middle" font-size="13" font-weight="500" fill="#7FC8FF">What's the weather?</text>


  <!-- Arrow + Snapshot label -->
  <line x1="302" y1="216" x2="366" y2="216" stroke="#7FC8FF" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="334" y="208" text-anchor="middle" font-size="10" font-weight="600" fill="#7FC8FF" letter-spacing="0.04em">Snapshot</text>


  <!--
    BILLING PANEL
    Excalidraw (right side, top to bottom):
      • 5,200 tokens — Billed at 100% cost   (turn 1 context, written to cache)
      • 6 tokens                               (new tokens this turn)
      • 5,203 tokens — Billed at 10% cost     (cache hit read-back)

    Vertically span ~108 to ~390 to align with the turn boxes
  -->

  <!-- 5,200 @ 100% -->
  <rect x="700" y="108" width="234" height="48" rx="9" fill="#0B1120" stroke="#1A2740" stroke-width="0.5"/>
  <text x="817" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#C8DDF0">5,200 tokens</text>
  <text x="817" y="146" text-anchor="middle" font-size="11" fill="#6B8299">Billed at 100% cost</text>

  <!-- 6 tokens (new) -->
  <rect x="700" y="216" width="234" height="38" rx="9" fill="#112338" stroke="#2A5A80" stroke-width="0.5"/>
  <text x="817" y="239" text-anchor="middle" font-size="13" font-weight="500" fill="#7FC8FF">6 tokens</text>

  <!-- 5,203 @ 10% -->
  <rect x="700" y="316" width="234" height="48" rx="9" fill="#0E1E0A" stroke="#1A4028" stroke-width="0.5"/>
  <text x="817" y="336" text-anchor="middle" font-size="13" font-weight="600" fill="#E3FF8F">5,203 tokens</text>
  <text x="817" y="354" text-anchor="middle" font-size="11" fill="#6B8299">Billed at 10% cost</text>

  <!-- dashed connectors -->
  <line x1="646" y1="132" x2="694" y2="132" stroke="#1A2740" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="646" y1="235" x2="694" y2="235" stroke="#2A5A80" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="646" y1="340" x2="694" y2="340" stroke="#1A4028" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- LangChain mark -->
  <g transform="translate(28,488) scale(0.048)" fill="#1A2740">
    <path d="M153.197 324.988C181.918 296.266 198.063 257.269 198.063 216.654C198.063 176.039 181.904 137.042 153.197 108.32L44.866 0C16.159 28.7218 0 67.7192 0 108.334C0 148.949 16.159 187.946 44.866 216.668L153.183 324.988H153.197Z"/>
    <path d="M379.871 335.012C351.164 306.304 312.153 290.145 271.554 290.145C230.954 290.145 191.944 306.304 163.223 335.012L271.554 443.346C300.261 472.054 339.271 488.213 379.885 488.213C420.498 488.213 459.495 472.054 488.215 443.346L379.885 335.012H379.871Z"/>
    <path d="M45.13 443.096C73.8509 471.804 112.847 487.963 153.461 487.963V334.762H0.25C0.263942 375.377 16.409 414.374 45.13 443.096Z"/>
    <path d="M421.695 174.84C392.974 146.132 353.978 129.959 313.35 129.973C272.737 129.973 233.74 146.132 205.02 174.854L313.35 283.188L421.695 174.84Z"/>
  </g>
</svg>
