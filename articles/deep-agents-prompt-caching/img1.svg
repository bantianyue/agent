<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="500" viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg">
  <title>The token cost of a conversation</title>
  <defs>
    <style>
      text { font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#7FC8FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="500" fill="#030710"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="14" font-weight="600" fill="#C8DDF0">The token cost of a conversation</text>

  <!--
    LEFT: Turn 1
    Box contents: System Prompt + Tools + Skills + ellipsis
    Box height: top-pad 14 + badge 20 + gap 10 + 3×(52+12) + ellipsis-row 28 + bottom-pad 14 = 14+20+10+192+28+14 = 278
    Good morning! sits OUTSIDE below the box
  -->
  <!-- Turn 1 box: y=50, height=278 → bottom=328 -->
  <rect x="28" y="50" width="268" height="278" rx="12" fill="#0B1120" stroke="#1A2740" stroke-width="1"/>
  <!-- badge -->
  <text x="40" y="72" font-size="11" font-weight="500" fill="#C8DDF0">5,200 tokens</text>
  <!-- System Prompt -->
  <rect x="40" y="82" width="244" height="48" rx="7" fill="#161F33" stroke="#1A2740" stroke-width="0.5"/>
  <text x="162" y="111" text-anchor="middle" font-size="13" font-weight="500" fill="#C8DDF0">System Prompt</text>
  <!-- Tools -->
  <rect x="40" y="142" width="244" height="48" rx="7" fill="#161F33" stroke="#1A2740" stroke-width="0.5"/>
  <text x="162" y="171" text-anchor="middle" font-size="13" font-weight="500" fill="#C8DDF0">Tools</text>
  <!-- Skills -->
  <rect x="40" y="202" width="244" height="48" rx="7" fill="#161F33" stroke="#1A2740" stroke-width="0.5"/>
  <text x="162" y="231" text-anchor="middle" font-size="13" font-weight="500" fill="#C8DDF0">Skills</text>
  <!-- ellipsis: y=262, centre of 28px row -->
  <text x="162" y="277" text-anchor="middle" font-size="14" fill="#6B8299">···</text>

  <!-- gap label: box bottom=328, user msg top=358 → label at midpoint 343 -->
  <text x="162" y="345" text-anchor="middle" font-size="11" fill="#6B8299">+ 3 tokens</text>

  <!-- Good morning! OUTSIDE — top=358, height=38, bottom=396 -->
  <rect x="40" y="358" width="244" height="38" rx="7" fill="#112338" stroke="#2A5A80" stroke-width="0.5"/>
  <text x="162" y="381" text-anchor="middle" font-size="13" font-weight="500" fill="#7FC8FF">Good morning!</text>


  <!--
    RIGHT: Turn 2
    Box contents: System Prompt + Tools + Skills + ellipsis + Good morning! (prior turn, inside)
    Box height: top-pad 14 + badge 20 + gap 10 + 3×(52+12) + ellipsis-row 28 + gap 8 + prior-msg 38 + bottom-pad 14 = 14+20+10+192+28+8+38+14 = 324
    What's the weather? sits OUTSIDE
  -->
  <!-- Turn 2 box: y=50, height=324 → bottom=374 -->
  <rect x="372" y="50" width="268" height="324" rx="12" fill="#0B1120" stroke="#1A2740" stroke-width="1"/>
  <text x="384" y="72" font-size="11" font-weight="500" fill="#C8DDF0">5,203 tokens</text>
  <!-- System Prompt -->
  <rect x="384" y="82" width="244" height="48" rx="7" fill="#161F33" stroke="#1A2740" stroke-width="0.5"/>
  <text x="506" y="111" text-anchor="middle" font-size="13" font-weight="500" fill="#C8DDF0">System Prompt</text>
  <!-- Tools -->
  <rect x="384" y="142" width="244" height="48" rx="7" fill="#161F33" stroke="#1A2740" stroke-width="0.5"/>
  <text x="506" y="171" text-anchor="middle" font-size="13" font-weight="500" fill="#C8DDF0">Tools</text>
  <!-- Skills -->
  <rect x="384" y="202" width="244" height="48" rx="7" fill="#161F33" stroke="#1A2740" stroke-width="0.5"/>
  <text x="506" y="231" text-anchor="middle" font-size="13" font-weight="500" fill="#C8DDF0">Skills</text>
  <!-- ellipsis -->
  <text x="506" y="277" text-anchor="middle" font-size="14" fill="#6B8299">···</text>
  <!-- Good morning! INSIDE — prior turn now part of context -->
  <rect x="384" y="290" width="244" height="38" rx="7" fill="#161F33" stroke="#1A2740" stroke-width="0.5"/>
  <text x="506" y="313" text-anchor="middle" font-size="13" font-weight="500" fill="#6B8299">Good morning!</text>

  <!-- gap label: box bottom=374, user msg top=404 → label at 391 -->
  <text x="506" y="391" text-anchor="middle" font-size="11" fill="#6B8299">+ 3 tokens</text>

  <!-- What's the weather? OUTSIDE — top=404 -->
  <rect x="384" y="404" width="244" height="38" rx="7" fill="#112338" stroke="#2A5A80" stroke-width="0.5"/>
  <text x="506" y="427" text-anchor="middle" font-size="13" font-weight="500" fill="#7FC8FF">What's the weather?</text>


  <!-- Arrow between turns, vertically centred on box midpoints -->
  <line x1="302" y1="212" x2="366" y2="212" stroke="#7FC8FF" stroke-width="1.5" marker-end="url(#arr)"/>


  <!--
    BILLING PANEL (right)
    Excalidraw: 10,403 tokens (top box) + 6 tokens (bottom box) + "Billed at 100% cost" label
    Position centred vertically around turn-2 box midpoint (~212)
  -->
  <rect x="700" y="168" width="234" height="44" rx="9" fill="#0B1120" stroke="#1A2740" stroke-width="0.5"/>
  <text x="817" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#C8DDF0">10,403 tokens</text>

  <rect x="700" y="224" width="234" height="38" rx="9" fill="#112338" stroke="#2A5A80" stroke-width="0.5"/>
  <text x="817" y="247" text-anchor="middle" font-size="13" font-weight="500" fill="#7FC8FF">6 tokens</text>

  <text x="817" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#C8DDF0" letter-spacing="0.03em">Billed at 100% cost</text>

  <!-- dashed connectors from turn-2 right edge to billing boxes -->
  <line x1="646" y1="190" x2="694" y2="190" stroke="#1A2740" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="646" y1="243" x2="694" y2="243" stroke="#2A5A80" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- LangChain mark (subtle, bottom-left) -->
  <g transform="translate(28,458) scale(0.048)" fill="#1A2740">
    <path d="M153.197 324.988C181.918 296.266 198.063 257.269 198.063 216.654C198.063 176.039 181.904 137.042 153.197 108.32L44.866 0C16.159 28.7218 0 67.7192 0 108.334C0 148.949 16.159 187.946 44.866 216.668L153.183 324.988H153.197Z"/>
    <path d="M379.871 335.012C351.164 306.304 312.153 290.145 271.554 290.145C230.954 290.145 191.944 306.304 163.223 335.012L271.554 443.346C300.261 472.054 339.271 488.213 379.885 488.213C420.498 488.213 459.495 472.054 488.215 443.346L379.885 335.012H379.871Z"/>
    <path d="M45.13 443.096C73.8509 471.804 112.847 487.963 153.461 487.963V334.762H0.25C0.263942 375.377 16.409 414.374 45.13 443.096Z"/>
    <path d="M421.695 174.84C392.974 146.132 353.978 129.959 313.35 129.973C272.737 129.973 233.74 146.132 205.02 174.854L313.35 283.188L421.695 174.84Z"/>
  </g>
</svg>
