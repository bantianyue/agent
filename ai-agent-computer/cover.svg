<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <defs>
    <!-- Deep space gradient background -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#060e1a"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>

    <!-- Cube glow gradient -->
    <radialGradient id="cubeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00a3ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00a3ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Agent glow -->
    <radialGradient id="agentGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Orange accent glow -->
    <radialGradient id="orangeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6a33" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6a33" stop-opacity="0"/>
    </radialGradient>

    <!-- Code line gradient -->
    <linearGradient id="codeFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Beam gradient -->
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="beamGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Cube face gradients -->
    <linearGradient id="cubeFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00a3ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0088cc" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="cubeFaceSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0088cc" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#006699" stop-opacity="0.04"/>
    </linearGradient>

    <linearGradient id="cubeFaceTop" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ddff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00bbee" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.08"/>
    </pattern>

    <!-- Star field -->
    <filter id="starBlur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>

    <!-- Glow filter -->
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for cube content -->
    <clipPath id="cubeClip">
      <polygon points="530,155 590,185 530,215 470,185"/>
    </clipPath>
    <clipPath id="cubeClipSide">
      <polygon points="590,185 590,245 530,275 530,215"/>
    </clipPath>
    <clipPath id="cubeClipTop">
      <polygon points="530,155 590,185 530,215 470,185"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bgGlow)"/>
  <rect width="900" height="383" fill="url(#grid)"/>

  <!-- Stars -->
  <g filter="url(#starBlur)">
    <circle cx="80" cy="50" r="1" fill="#fff" opacity="0.6"/>
    <circle cx="200" cy="30" r="0.8" fill="#fff" opacity="0.4"/>
    <circle cx="350" cy="80" r="1.2" fill="#fff" opacity="0.5"/>
    <circle cx="700" cy="45" r="0.7" fill="#fff" opacity="0.3"/>
    <circle cx="820" cy="90" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="150" cy="320" r="0.6" fill="#fff" opacity="0.3"/>
    <circle cx="450" cy="350" r="0.8" fill="#fff" opacity="0.4"/>
    <circle cx="750" cy="330" r="0.7" fill="#fff" opacity="0.3"/>
    <circle cx="50" cy="200" r="0.5" fill="#fff" opacity="0.3"/>
    <circle cx="850" cy="250" r="0.9" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Center cube glow -->
  <circle cx="530" cy="215" r="100" fill="url(#cubeGlow)"/>

  <!-- === LEFT SIDE AI AGENT (Agent 1) === -->
  <g transform="translate(340, 145)">
    <!-- Agent outer glow -->
    <circle cx="0" cy="0" r="40" fill="url(#agentGlow)"/>
    <!-- Agent head (circle) -->
    <circle cx="0" cy="-18" r="10" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <!-- Agent body (trapezoid/rectangle) -->
    <rect x="-8" y="-7" width="16" height="18" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
    <!-- Agent arm left -->
    <line x1="-8" y1="-3" x2="-14" y2="5" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <!-- Agent arm right -->
    <line x1="8" y1="-3" x2="14" y2="5" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <!-- Connecting beam to cube -->
    <line x1="14" y1="5" x2="185" y2="55" stroke="url(#beamGrad)" stroke-width="1" opacity="0.4"/>
    <!-- Data dots flowing along beam -->
    <circle cx="70" cy="20" r="1.5" fill="#00d4ff" opacity="0.6"/>
    <circle cx="120" cy="32" r="1" fill="#00d4ff" opacity="0.4"/>
    <circle cx="160" cy="45" r="0.8" fill="#00d4ff" opacity="0.3"/>
  </g>

  <!-- === RIGHT SIDE AI AGENT (Agent 2) === -->
  <g transform="translate(720, 250)">
    <circle cx="0" cy="0" r="40" fill="url(#agentGlow)"/>
    <circle cx="0" cy="-18" r="10" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <rect x="-8" y="-7" width="16" height="18" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="-8" y1="-3" x2="-14" y2="5" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="8" y1="-3" x2="14" y2="5" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <!-- Connecting beam to cube -->
    <line x1="-14" y1="5" x2="-185" y2="-48" stroke="url(#beamGrad2)" stroke-width="1" opacity="0.4"/>
    <circle cx="-70" cy="-5" r="1.5" fill="#00d4ff" opacity="0.6"/>
    <circle cx="-120" cy="-20" r="1" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- === TOP AI AGENT (Agent 3) === -->
  <g transform="translate(530, 90)">
    <circle cx="0" cy="0" r="35" fill="url(#agentGlow)"/>
    <circle cx="0" cy="-15" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
    <rect x="-7" y="-6" width="14" height="16" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.7"/>
    <line x1="-7" y1="-2" x2="-12" y2="4" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="7" y1="-2" x2="12" y2="4" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <!-- Connecting beam -->
    <line x1="0" y1="15" x2="0" y2="60" stroke="url(#beamGrad)" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- === ORANGE ACCENT AGENT (bottom right, warm tone) === -->
  <g transform="translate(660, 300)">
    <circle cx="0" cy="0" r="30" fill="url(#orangeGlow)"/>
    <circle cx="0" cy="-14" r="7" fill="none" stroke="#ff6a33" stroke-width="1.2" opacity="0.7"/>
    <rect x="-6" y="-6" width="12" height="14" rx="2" fill="none" stroke="#ff6a33" stroke-width="1" opacity="0.6"/>
    <line x1="-6" y1="-2" x2="-10" y2="4" stroke="#ff6a33" stroke-width="0.8" opacity="0.4"/>
    <line x1="6" y1="-2" x2="10" y2="4" stroke="#ff6a33" stroke-width="0.8" opacity="0.4"/>
    <!-- Orange beam -->
    <line x1="-10" y1="4" x2="-105" y2="-75" stroke="#ff6a33" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- === CENTER CUBE === -->
  <g transform="translate(530, 215)">
    <!-- Cube shadow/glow under -->
    <ellipse cx="0" cy="32" rx="45" ry="8" fill="#00a3ff" opacity="0.1" filter="url(#softGlow)"/>

    <!-- Cube front face -->
    <polygon points="0,-30 60,0 0,30 -60,0" fill="url(#cubeFace)" stroke="#00d4ff" stroke-width="1.2" opacity="0.9" filter="url(#glowFilter)"/>

    <!-- Cube right face -->
    <polygon points="60,0 60,60 0,90 0,30" fill="url(#cubeFaceSide)" stroke="#00a3ff" stroke-width="0.8" opacity="0.7"/>

    <!-- Cube top face -->
    <polygon points="0,-30 60,0 0,30 -60,0" fill="url(#cubeFaceTop)" stroke="#00ddff" stroke-width="0.6" opacity="0.6"/>

    <!-- Cube edge highlights -->
    <line x1="0" y1="-30" x2="60" y2="0" stroke="#00eeff" stroke-width="0.8" opacity="0.6"/>
    <line x1="0" y1="-30" x2="-60" y2="0" stroke="#00eeff" stroke-width="0.5" opacity="0.4"/>

    <!-- === CODE LINES ON CUBE FRONT === -->
    <g opacity="0.7">
      <!-- Code line 1 -->
      <text x="-35" y="-12" font-family="'Courier New', monospace" font-size="5" fill="#00d4ff" opacity="0.8">function init() {</text>
      <!-- Code line 2 -->
      <text x="-32" y="-5" font-family="'Courier New', monospace" font-size="5" fill="#00d4ff" opacity="0.6">  const agent = new</text>
      <!-- Code line 3 -->
      <text x="-30" y="2" font-family="'Courier New', monospace" font-size="5" fill="#00d4ff" opacity="0.5">  Agent({ model:</text>
      <!-- Code line 4 -->
      <text x="-28" y="9" font-family="'Courier New', monospace" font-size="4" fill="#00d4ff" opacity="0.4">  tools: ["terminal",</text>
      <!-- Code line 5 -->
      <text x="-30" y="16" font-family="'Courier New', monospace" font-size="4" fill="#00a3ff" opacity="0.3">  memory: true })</text>
    </g>

    <!-- === TERMINAL WINDOW ON CUBE RIGHT FACE === -->
    <g transform="translate(5, 8)" opacity="0.6">
      <!-- Terminal window border -->
      <rect x="0" y="0" width="48" height="22" rx="1" fill="none" stroke="#00a3ff" stroke-width="0.5" opacity="0.5"/>
      <!-- Terminal title bar dots -->
      <circle cx="6" cy="4" r="1.5" fill="#ff5f57" opacity="0.6"/>
      <circle cx="12" cy="4" r="1.5" fill="#ffbd2e" opacity="0.6"/>
      <circle cx="18" cy="4" r="1.5" fill="#28c840" opacity="0.6"/>
      <!-- Terminal text -->
      <text x="3" y="12" font-family="'Courier New', monospace" font-size="3.5" fill="#00a3ff" opacity="0.6">$ hermes run --</text>
      <text x="3" y="17" font-family="'Courier New', monospace" font-size="3.5" fill="#00a3ff" opacity="0.4">  skills memory</text>
      <!-- Blinking cursor -->
      <rect x="30" y="15" width="3" height="4" fill="#00d4ff" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0;0.5" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- === FILE TREE ON CUBE TOP FACE === -->
    <g transform="translate(-40, -22)" opacity="0.5">
      <text x="0" y="0" font-family="'Courier New', monospace" font-size="3.5" fill="#00ddff" opacity="0.5">📁 agents/</text>
      <text x="8" y="6" font-family="'Courier New', monospace" font-size="3.5" fill="#00ddff" opacity="0.4">📁 core/</text>
      <text x="15" y="11" font-family="'Courier New', monospace" font-size="3" fill="#00ddff" opacity="0.35">📄 agent.ts</text>
      <text x="15" y="16" font-family="'Courier New', monospace" font-size="3" fill="#00ddff" opacity="0.3">📄 tools.ts</text>
      <text x="8" y="22" font-family="'Courier New', monospace" font-size="3" fill="#00ddff" opacity="0.3">📁 memory/</text>
    </g>

    <!-- === DATA RINGS AROUND CUBE === -->
    <ellipse cx="0" cy="0" rx="75" ry="20" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.15" transform="rotate(-15)"/>
    <ellipse cx="0" cy="0" rx="85" ry="25" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.1" transform="rotate(10)"/>

    <!-- Orbiting data dots -->
    <g opacity="0.5">
      <!-- Orbiting dot 1 -->
      <circle r="3" fill="#00d4ff" opacity="0.7">
        <animateMotion dur="6s" repeatCount="indefinite" path="M0,-75 A75,25 -15 1,1 0,75 A75,25 -15 0,1 0,-75"/>
      </circle>
      <!-- Orbiting dot 2 -->
      <circle r="2" fill="#ff6a33" opacity="0.5">
        <animateMotion dur="8s" repeatCount="indefinite" path="M0,-85 A85,25 10 0,1 0,85 A85,25 10 0,1 0,-85"/>
      </circle>
    </g>
  </g>

  <!-- === FLOATING CODE LINES (decorative) === -->
  <g fill="none" stroke="url(#codeFade)" stroke-width="0.5" opacity="0.3">
    <!-- Left side data streams -->
    <text x="160" y="200" font-family="'Courier New', monospace" font-size="4" fill="#00d4ff" opacity="0.3">{"agent": "self-hosted"}</text>
    <text x="180" y="260" font-family="'Courier New', monospace" font-size="3.5" fill="#00a3ff" opacity="0.2">tensor.shape: [1, 512]</text>
    <text x="200" y="150" font-family="'Courier New', monospace" font-size="3" fill="#00d4ff" opacity="0.2">git push origin main</text>

    <!-- Right side data streams -->
    <text x="680" y="130" font-family="'Courier New', monospace" font-size="4" fill="#00d4ff" opacity="0.25">api.get("/agent")</text>
    <text x="710" y="180" font-family="'Courier New', monospace" font-size="3.5" fill="#00a3ff" opacity="0.2">ctx.log("running")</text>
    <text x="760" y="160" font-family="'Courier New', monospace" font-size="3" fill="#ff6a33" opacity="0.15">agent.memory.sync()</text>
  </g>

  <!-- === DECORATIVE LINES === -->
  <g stroke="#00d4ff" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="191" x2="300" y2="191"/>
    <line x1="0" y1="192" x2="300" y2="192"/>
    <line x1="750" y1="100" x2="900" y2="100"/>
    <line x1="760" y1="101" x2="900" y2="101"/>
  </g>

  <!-- === TITLE AREA (left side) === -->

  <!-- Bottom-left accent line -->
  <line x1="30" y1="320" x2="30" y2="350" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="350" x2="250" y2="350" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>

  <!-- Small tag badge -->
  <rect x="30" y="45" width="80" height="18" rx="9" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
  <text x="70" y="57" font-family="'Inter', -apple-system, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle" opacity="0.7">封面</text>

  <!-- Bottom right corner decorative -->
  <g opacity="0.08">
    <line x1="850" y1="353" x2="870" y2="353" stroke="#00d4ff" stroke-width="0.5"/>
    <line x1="870" y1="353" x2="870" y2="333" stroke="#00d4ff" stroke-width="0.5"/>
  </g>

</svg>
