<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI World Cup</title>
<script>p5.disableFriendlyErrors = true;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>
html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0a1a; }
canvas { display: block; }
</style>
</head>
<body>
<script>
// === AI World Cup - 30 Second Animation ===
const TOTAL_FRAMES = 900;
let frameCount = 0;

const C = {
  openai: [16, 163, 127],
  anthropic: [212, 165, 116],
  xai: [108, 92, 231],
  gold: [255, 215, 0],
  white: [255, 255, 255]
};

let particles = [];
let stars = [];
let sceneTime = 0;
let currentScene = 0;

function setup() {
  createCanvas(1080, 1080);
  frameRate(30);
  pixelDensity(1);
  
  for (let i = 0; i < 100; i++) {
    stars.push({ x: random(width), y: random(height), size: random(0.5, 2), alpha: random(50, 200) });
  }
  for (let i = 0; i < 30; i++) {
    let c = random([C.openai, C.anthropic, C.xai]);
    particles.push({ x: random(width), y: random(height), vx: random(-0.3, 0.3), vy: random(-0.3, 0.3), size: random(2, 6), alpha: random(20, 60), r: c[0], g: c[1], b: c[2] });
  }
  
  noLoop();
  window._p5Ready = true;
}

function draw() {
  if (frameCount >= TOTAL_FRAMES) return;
  
  sceneTime = frameCount / TOTAL_FRAMES;
  let t = sceneTime;
  
  if (t < 0.15) currentScene = 0;
  else if (t < 0.35) currentScene = 1;
  else if (t < 0.55) currentScene = 2;
  else if (t < 0.78) currentScene = 3;
  else currentScene = 4;
  
  drawBackground();
  drawField();
  
  switch(currentScene) {
    case 0: drawTitleScene(t); break;
    case 1: drawSplitScene(t); break;
    case 2: drawMuskScene(t); break;
    case 3: drawMatchScene(t); break;
    case 4: drawFinalScene(t); break;
  }
  
  drawParticles();
  frameCount++;
}

function drawBackground() {
  for (let y = 0; y < height; y++) {
    let inter = y / height;
    stroke(lerp(10, 5, inter), lerp(10, 8, inter), lerp(26, 30, inter));
    line(0, y, width, y);
  }
  for (let s of stars) {
    let flicker = sin(frameCount * 0.02 + s.x) * 0.3 + 0.7;
    fill(255, s.alpha * flicker);
    noStroke();
    circle(s.x, s.y, s.size);
  }
}

function drawField() {
  push();
  translate(width/2, height/2);
  noFill();
  stroke(255, 30);
  strokeWeight(2);
  circle(0, 0, 700);
  stroke(255, 20);
  strokeWeight(1);
  line(0, -350, 0, 350);
  circle(0, 0, 100);
  for (let i = 0; i < 3; i++) {
    stroke(255, 15 - i * 4);
    strokeWeight(1);
    circle(0, 0, 700 + i * 20);
  }
  pop();
}

function drawParticles() {
  for (let p of particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > width) p.vx *= -1;
    if (p.y < 0 || p.y > height) p.vy *= -1;
    fill(p.r, p.g, p.b, p.alpha);
    noStroke();
    circle(p.x, p.y, p.size);
  }
}

function drawTitleScene(t) {
  let progress = min(t / 0.1, 1);
  push();
  textAlign(CENTER, CENTER);
  
  let titleSize = lerp(60, 72, easeInOut(progress));
  let titleAlpha = lerp(0, 255, easeInOut(progress));
  fill(255, titleAlpha);
  textSize(titleSize);
  textStyle(BOLD);
  text('AI WORLD CUP', width/2, height/2 - 120);
  
  let subAlpha = lerp(0, 255, easeInOut(max(0, (progress - 0.3) / 0.3)));
  fill(180, subAlpha);
  textSize(24);
  text('OpenAI · Anthropic · xAI', width/2, height/2 - 50);
  
  let teamColors = [C.openai, C.anthropic, C.xai];
  let teamNames = ['OpenAI', 'Anthropic', 'xAI'];
  for (let i = 0; i < 3; i++) {
    let lp = max(0, (progress - (0.5 + i * 0.08)) / 0.15);
    let lx = width/2 + (i - 1) * 200;
    let ly = height/2 + 80;
    let lsize = lerp(0, 40, easeOut(lp));
    let lalpha = lerp(0, 255, easeOut(lp));
    fill(teamColors[i][0], teamColors[i][1], teamColors[i][2], lalpha * 0.2);
    noStroke();
    circle(lx, ly, lsize * 2);
    fill(teamColors[i][0], teamColors[i][1], teamColors[i][2], lalpha);
    textSize(lsize * 0.4);
    textStyle(BOLD);
    text(teamNames[i], lx, ly + lsize + 15);
  }
  
  let tagAlpha = lerp(0, 180, easeInOut(max(0, (progress - 0.7) / 0.2)));
  fill(255, tagAlpha);
  textSize(16);
  textStyle(ITALIC);
  text('Three giants. One trophy. No rules.', width/2, height - 100);
  pop();
}

function drawSplitScene(t) {
  let sceneT = (t - 0.15) / 0.2;
  let progress = min(sceneT, 1);
  push();
  textAlign(CENTER, CENTER);
  
  let oaiX = lerp(width/2, width/4, easeInOut(min(progress * 2, 1)));
  let oaiY = height/2;
  
  fill(C.openai[0], C.openai[1], C.openai[2], 64);
  noStroke();
  circle(oaiX, oaiY, 120);
  fill(C.openai[0], C.openai[1], C.openai[2]);
  textSize(20);
  textStyle(BOLD);
  text('OpenAI', oaiX, oaiY - 90);
  for (let i = 0; i < 3; i++) {
    let px = oaiX + cos(TWO_PI * i / 3 + frameCount * 0.01) * 45;
    let py = oaiY + sin(TWO_PI * i / 3 + frameCount * 0.01) * 45;
    fill(C.openai[0], C.openai[1], C.openai[2]);
    circle(px, py, 18);
  }
  
  let splitProgress = max(0, min((progress - 0.2) / 0.4, 1));
  let anthropicX = lerp(width/2, 3 * width/4, easeInOut(splitProgress));
  let anthropicY = height/2;
  
  fill(C.anthropic[0], C.anthropic[1], C.anthropic[2], 64);
  noStroke();
  circle(anthropicX, anthropicY, 100);
  fill(C.anthropic[0], C.anthropic[1], C.anthropic[2]);
  textSize(20);
  textStyle(BOLD);
  text('Anthropic', anthropicX, anthropicY - 85);
  
  for (let i = 0; i < 3; i++) {
    let splitDelay = 0.15 + i * 0.08;
    let pProgress = max(0, min((splitProgress - splitDelay) / 0.2, 1));
    let startX = oaiX + cos(TWO_PI * i / 3) * 45;
    let startY = oaiY + sin(TWO_PI * i / 3) * 45;
    let endX = anthropicX + cos(TWO_PI * i / 3 + 0.5) * 38;
    let endY = anthropicY + sin(TWO_PI * i / 3 + 0.5) * 38;
    let px = lerp(startX, endX, easeInOut(pProgress));
    let py = lerp(startY, endY, easeInOut(pProgress));
    if (pProgress > 0 && pProgress < 1) {
      stroke(C.anthropic[0], C.anthropic[1], C.anthropic[2], 100);
      strokeWeight(2);
      line(startX, startY, px, py);
    }
    let lerpAmt = pProgress;
    fill(
      lerp(C.openai[0], C.anthropic[0], lerpAmt),
      lerp(C.openai[1], C.anthropic[1], lerpAmt),
      lerp(C.openai[2], C.anthropic[2], lerpAmt)
    );
    circle(px, py, 18);
  }
  
  if (splitProgress > 0.3) {
    let labelAlpha = lerp(0, 255, easeInOut(min((splitProgress - 0.3) / 0.2, 1)));
    fill(255, 200, 100, labelAlpha);
    textSize(16);
    textStyle(ITALIC);
    text('"The Great Split"', width/2, height/2 + 180);
    textSize(13);
    fill(200, labelAlpha * 0.7);
    text('Former OpenAI employees found Anthropic', width/2, height/2 + 210);
  }
  pop();
}

function drawMuskScene(t) {
  let sceneT = (t - 0.35) / 0.2;
  let progress = min(sceneT, 1);
  push();
  textAlign(CENTER, CENTER);
  
  let teamPositions = [
    { x: width/6, y: height/2, c: C.openai, name: 'OpenAI' },
    { x: width/2, y: height/2, c: C.anthropic, name: 'Anthropic' },
    { x: 5 * width/6, y: height/2, c: C.xai, name: 'xAI' }
  ];
  
  for (let tp of teamPositions) {
    let entryDelay = tp.name === 'xAI' ? 0.3 : 0;
    let ep = max(0, min((progress - entryDelay) / 0.2, 1));
    let px = lerp(width + 100, tp.x, easeOut(ep));
    let py = tp.y;
    fill(tp.c[0], tp.c[1], tp.c[2], 48);
    noStroke();
    circle(px, py, 90);
    fill(tp.c[0], tp.c[1], tp.c[2]);
    textSize(18);
    textStyle(BOLD);
    text(tp.name, px, py - 75);
    for (let i = 0; i < 3; i++) {
      let ppx = px + cos(TWO_PI * i / 3 + frameCount * 0.015) * 35;
      let ppy = py + sin(TWO_PI * i / 3 + frameCount * 0.015) * 35;
      fill(tp.c[0], tp.c[1], tp.c[2]);
      circle(ppx, ppy, 16);
    }
  }
  
  if (progress > 0.5) {
    let tensionAlpha = lerp(0, 60, easeInOut(min((progress - 0.5) / 0.3, 1)));
    stroke(255, 100, 100, tensionAlpha);
    strokeWeight(2);
    line(width/6, height/2, 5*width/6, height/2);
    line(width/2, height/2, 5*width/6, height/2);
    let labelAlpha = lerp(0, 255, easeInOut(min((progress - 0.5) / 0.2, 1)));
    fill(255, 150, 150, labelAlpha);
    textSize(14);
    text('Lawsuit ⚡', width/2, height/2 - 130);
    text('Competition ⚡', 3 * width/4 + 50, height/2 - 130);
  }
  
  if (progress < 0.5) {
    let entryAlpha = lerp(255, 0, easeInOut(min(progress / 0.3, 1)));
    fill(C.xai[0], C.xai[1], C.xai[2], entryAlpha);
    textSize(28);
    textStyle(BOLD);
    text('🚀 Elon Musk Enters', width/2, height - 80);
  }
  pop();
}

function drawMatchScene(t) {
  let sceneT = (t - 0.55) / 0.23;
  let progress = min(sceneT, 1);
  push();
  textAlign(CENTER, CENTER);
  drawMatchup(width/2, height/4 - 20, C.openai, C.anthropic, 'OpenAI', 'Anthropic', progress, 0, 'The Split', 'Former teammates now rivals');
  drawMatchup(width/2, height/2, C.openai, C.xai, 'OpenAI', 'xAI', progress, 0.25, 'The Lawsuit', 'Musk vs his creation');
  drawMatchup(width/2, 3*height/4 + 20, C.anthropic, C.xai, 'Anthropic', 'xAI', progress, 0.5, 'The Ideology War', 'Safety vs Speed');
  pop();
}

function drawMatchup(cx, cy, c1, c2, n1, n2, progress, delay, title, subtitle) {
  let p = max(0, min((progress - delay) / 0.3, 1));
  if (p <= 0) return;
  let vsAlpha = lerp(0, 255, easeOut(p));
  fill(255, vsAlpha);
  textSize(16);
  textStyle(BOLD);
  text(title, cx, cy - 45);
  fill(200, vsAlpha * 0.7);
  textSize(11);
  text(subtitle, cx, cy - 25);
  
  fill(c1[0], c1[1], c1[2], 64);
  noStroke();
  circle(cx - 120, cy + 15, 50);
  fill(c1[0], c1[1], c1[2]);
  textSize(12);
  textStyle(BOLD);
  text(n1, cx - 120, cy + 15);
  
  fill(c2[0], c2[1], c2[2], 64);
  circle(cx + 120, cy + 15, 50);
  fill(c2[0], c2[1], c2[2]);
  textSize(12);
  textStyle(BOLD);
  text(n2, cx + 120, cy + 15);
  
  if (p > 0.2) {
    let badgeAlpha = lerp(0, 255, easeOut(min((p - 0.2) / 0.15, 1)));
    fill(255, 50, 50, badgeAlpha);
    circle(cx, cy + 15, 28);
    fill(255, badgeAlpha);
    textSize(11);
    textStyle(BOLD);
    text('VS', cx, cy + 15);
  }
  
  if (p > 0.4) {
    let ballT = (p - 0.4) / 0.6;
    let bx = lerp(cx - 120, cx + 120, (sin(ballT * PI * 3) + 1) / 2);
    let by = cy + 15 + sin(ballT * PI * 6) * 15;
    fill(255);
    circle(bx, by, 8);
    fill(255, 100);
    circle(bx, by, 14);
  }
  
  if (p > 0.3) {
    let lineAlpha = lerp(0, 40, easeInOut(min((p - 0.3) / 0.2, 1)));
    stroke(255, lineAlpha);
    strokeWeight(1);
    line(cx - 95, cy + 15, cx + 95, cy + 15);
  }
}

function drawFinalScene(t) {
  let sceneT = (t - 0.78) / 0.22;
  let progress = min(sceneT, 1);
  push();
  textAlign(CENTER, CENTER);
  
  let trophyScale = lerp(0, 1, easeOut(min(progress * 1.5, 1)));
  let trophyY = lerp(height + 100, height/2 - 40, easeOut(min(progress, 1)));
  
  let glowSize = 150 + sin(frameCount * 0.05) * 20;
  fill(C.gold[0], C.gold[1], C.gold[2], 30 * trophyScale);
  noStroke();
  circle(width/2, trophyY, glowSize);
  fill(C.gold[0], C.gold[1], C.gold[2], 60 * trophyScale);
  circle(width/2, trophyY, glowSize * 0.6);
  
  fill(C.gold[0], C.gold[1], C.gold[2], 255 * trophyScale);
  beginShape();
  vertex(width/2 - 20, trophyY - 25);
  vertex(width/2 + 20, trophyY - 25);
  vertex(width/2 + 25, trophyY + 5);
  vertex(width/2 - 25, trophyY + 5);
  endShape(CLOSE);
  noFill();
  stroke(C.gold[0], C.gold[1], C.gold[2], 200 * trophyScale);
  strokeWeight(3);
  arc(width/2 - 25, trophyY - 10, 15, 20, PI/2, 3*PI/2);
  arc(width/2 + 25, trophyY - 10, 15, 20, -PI/2, PI/2);
  fill(C.gold[0], C.gold[1], C.gold[2], 200 * trophyScale);
  noStroke();
  rect(width/2 - 5, trophyY + 5, 10, 15);
  rect(width/2 - 20, trophyY + 20, 40, 5, 2);
  
  let angleOffset = frameCount * 0.008;
  let teamColors = [C.openai, C.anthropic, C.xai];
  let teamNames = ['OpenAI', 'Anthropic', 'xAI'];
  for (let i = 0; i < 3; i++) {
    let a = angleOffset + TWO_PI * i / 3;
    let orbitR = 180 + sin(frameCount * 0.01 + i) * 20;
    let tx = width/2 + cos(a) * orbitR;
    let ty = trophyY + sin(a) * orbitR;
    fill(teamColors[i][0], teamColors[i][1], teamColors[i][2], 80);
    circle(tx, ty, 50);
    fill(teamColors[i][0], teamColors[i][1], teamColors[i][2]);
    textSize(11);
    textStyle(BOLD);
    text(teamNames[i], tx, ty);
  }
  
  if (progress > 0.4) {
    let textAlpha = lerp(0, 255, easeInOut(min((progress - 0.4) / 0.3, 1)));
    fill(255, textAlpha);
    textSize(22);
    textStyle(BOLD);
    text('Who takes the trophy?', width/2, height - 100);
    fill(200, textAlpha * 0.8);
    textSize(14);
    text('The game is just beginning...', width/2, height - 70);
  }
  
  if (progress > 0.7) {
    let creditAlpha = lerp(0, 150, easeInOut(min((progress - 0.7) / 0.2, 1)));
    fill(255, creditAlpha);
    textSize(12);
    textStyle(ITALIC);
    text('AI圈的9527', width/2, height - 30);
  }
  pop();
}

function easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }
function easeOut(t) { return 1 - pow(1 - t, 3); }
function easeIn(t) { return t * t * t; }
</script>
</body>
