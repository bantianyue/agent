<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Football Face Swap</title>
<script>p5.disableFriendlyErrors = true;</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>
html, body { margin: 0; padding: 0; overflow: hidden; background: #1a3d1a; }
canvas { display: block; }
</style>
</head>
<body>
<script>
// === AI Football Face Swap ===
// Football match with AI faces (Sam Altman, Dario Amodei, Elon Musk)

const TOTAL_FRAMES = 900; // 30s at 30fps
let frameCount = 0;
let fieldImg, goalImg;

// Face images
let samFace, darioFace, elonFace;

// Teams
const TEAM_A = {
  name: 'OpenAI',
  color: [16, 163, 127],
  faces: []  // will hold face images
};
const TEAM_B = {
  name: 'Anthropic',
  color: [212, 165, 116],
  faces: []
};
const TEAM_C = {
  name: 'xAI',
  color: [108, 92, 231],
  faces: []
};

// Players on field
let players = [];
let ball = { x: 0, y: 0, vx: 0, vy: 0 };
let crowd = [];

function preload() {
  samFace = loadImage('sam_altman.jpg');
  darioFace = loadImage('dario_amodei.jpg');
  elonFace = loadImage('elon_musk.jpg');
}

function setup() {
  createCanvas(1080, 1080);
  frameRate(30);
  pixelDensity(1);
  
  // Initialize players
  // Team OpenAI (3 players) - left side
  for (let i = 0; i < 3; i++) {
    players.push({
      team: 'A',
      x: random(150, 350),
      y: random(200, 800),
      targetX: 0, targetY: 0,
      size: 45,
      face: samFace,
      faceColor: TEAM_A.color,
      speed: random(1, 2.5),
      angle: 0,
      hasBall: false
    });
  }
  // Team Anthropic (3 players) - center
  for (let i = 0; i < 3; i++) {
    players.push({
      team: 'B',
      x: random(400, 600),
      y: random(200, 800),
      targetX: 0, targetY: 0,
      size: 45,
      face: darioFace,
      faceColor: TEAM_B.color,
      speed: random(1, 2.5),
      angle: 0,
      hasBall: false
    });
  }
  // Team xAI (3 players) - right side
  for (let i = 0; i < 3; i++) {
    players.push({
      team: 'C',
      x: random(700, 950),
      y: random(200, 800),
      targetX: 0, targetY: 0,
      size: 45,
      face: elonFace,
      faceColor: TEAM_C.color,
      speed: random(1, 2.5),
      angle: 0,
      hasBall: false
    });
  }
  
  // Crowd particles
  for (let i = 0; i < 60; i++) {
    crowd.push({
      x: random(width),
      y: random(20, 100),
      size: random(3, 6),
      color: random([
        [16, 163, 127], [212, 165, 116], [108, 92, 231],
        [255, 255, 255], [255, 215, 0]
      ]),
      wave: random(TWO_PI)
    });
  }
  
  // Ball
  ball.x = width/2;
  ball.y = height/2;
  ball.vx = random(-2, 2);
  ball.vy = random(-2, 2);
  
  noLoop();
  window._p5Ready = true;
}

function draw() {
  if (frameCount >= TOTAL_FRAMES) return;
  
  let t = frameCount / TOTAL_FRAMES;
  
  // Scene progression
  let scene;
  if (t < 0.15) scene = 0; // Warmup / intro
  else if (t < 0.50) scene = 1; // Match play
  else if (t < 0.75) scene = 2; // Goal celebration
  else scene = 3; // Victory pose
  
  drawField();
  drawCrowd();
  
  // Update and draw players
  updatePlayers(scene, t);
  drawPlayers();
  
  // Update and draw ball
  updateBall(scene, t);
  drawBall();
  
  // Draw scene overlays
  drawSceneOverlay(scene, t);
  
  frameCount++;
}

function drawField() {
  // Grass background
  for (let y = 0; y < height; y++) {
    let shade = map(y, 0, height, 40, 60);
    stroke(26, shade, 26);
    line(0, y, width, y);
  }
  
  // Field markings
  push();
  translate(width/2, height/2);
  
  // Center circle
  noFill();
  stroke(255, 60);
  strokeWeight(2);
  circle(0, 0, 200);
  
  // Center line
  line(0, -height/2 + 60, 0, height/2 - 60);
  
  // Center dot
  fill(255, 60);
  noStroke();
  circle(0, 0, 8);
  
  // Penalty areas
  stroke(255, 50);
  strokeWeight(2);
  noFill();
  // Left
  rect(-width/2 + 20, -180, 120, 360);
  // Right
  rect(width/2 - 140, -180, 120, 360);
  
  pop();
  
  // Grass lines
  push();
  for (let x = 0; x < width; x += 40) {
    stroke(30, 70, 30, 30);
    strokeWeight(1);
    line(x, 60, x, height - 60);
  }
  pop();
}

function drawCrowd() {
  for (let c of crowd) {
    c.wave += 0.05;
    let wx = sin(c.wave) * 5;
    fill(c.color[0], c.color[1], c.color[2], 150);
    noStroke();
    circle(c.x + wx, c.y + sin(c.wave * 0.7) * 3, c.size);
  }
}

function updatePlayers(scene, t) {
  for (let i = 0; i < players.length; i++) {
    let p = players[i];
    
    if (scene === 0) {
      // Intro: players jog into position
      let targetX = 150 + (i % 3) * 80 + floor(i / 3) * 300;
      let targetY = 300 + (i % 3) * 200;
      p.targetX = targetX;
      p.targetY = targetY;
    } else if (scene === 1) {
      // Match play: move around
      let phase = frameCount * 0.01 + i * 1.5;
      p.targetX = width/2 + cos(phase) * (200 + i * 30);
      p.targetY = height/2 + sin(phase * 0.7 + i) * 250;
      
      // Clamp to field
      p.targetX = constrain(p.targetX, 80, width - 80);
      p.targetY = constrain(p.targetY, 100, height - 100);
    } else if (scene === 2) {
      // Goal celebration: run toward goal
      if (p.team === 'A') {
        p.targetX = width - 100;
        p.targetY = height/2 + sin(frameCount * 0.05 + i) * 150;
      } else {
        p.targetX = 100;
        p.targetY = height/2 + cos(frameCount * 0.05 + i) * 150;
      }
    } else {
      // Victory pose: spread out
      p.targetX = 150 + i * 120;
      p.targetY = height/2 + sin(frameCount * 0.03 + i * 2) * 100;
    }
    
    // Move toward target
    p.x += (p.targetX - p.x) * 0.03 * p.speed;
    p.y += (p.targetY - p.y) * 0.03 * p.speed;
    p.angle = atan2(p.targetY - p.y, p.targetX - p.x);
  }
}

function drawPlayers() {
  for (let p of players) {
    push();
    translate(p.x, p.y);
    
    // Body (jersey)
    let bodyColor = p.faceColor;
    fill(bodyColor[0], bodyColor[1], bodyColor[2]);
    noStroke();
    
    // Body shape
    ellipse(0, 8, p.size * 0.8, p.size * 0.9);
    
    // Face circle (where face image goes)
    let faceR = p.size * 0.45;
    push();
    // Clip to circle
    beginClip();
    circle(0, -8, faceR * 2);
    endClip();
    
    // Draw face image
    if (p.face) {
      let imgSize = faceR * 2.2;
      image(p.face, -imgSize/2, -8 - imgSize/2, imgSize, imgSize);
    }
    pop();
    
    // Face circle border
    noFill();
    stroke(bodyColor[0], bodyColor[1], bodyColor[2], 200);
    strokeWeight(2);
    circle(0, -8, faceR * 2);
    
    // Legs
    stroke(255, 200);
    strokeWeight(4);
    let legSwing = sin(frameCount * 0.1 + p.x) * 5;
    line(-6, 20, -10 + legSwing, 35);
    line(6, 20, 10 - legSwing, 35);
    
    // Shoes
    fill(50);
    noStroke();
    ellipse(-10 + legSwing, 37, 8, 4);
    ellipse(10 - legSwing, 37, 8, 4);
    
    // Jersey number
    fill(255, 200);
    textSize(10);
    textAlign(CENTER, CENTER);
    textStyle(BOLD);
    let teamInitial = p.team === 'A' ? 'O' : p.team === 'B' ? 'A' : 'X';
    text(teamInitial, 0, 10);
    
    pop();
  }
}

function updateBall(scene, t) {
  if (scene === 0) {
    // Ball stays at center
    ball.x = width/2;
    ball.y = height/2;
    ball.vx = 0;
    ball.vy = 0;
  } else if (scene === 1) {
    // Ball moves around
    ball.x += ball.vx;
    ball.y += ball.vy;
    
    // Bounce off walls
    if (ball.x < 50 || ball.x > width - 50) ball.vx *= -1;
    if (ball.y < 80 || ball.y > height - 80) ball.vy *= -1;
    
    // Random nudges
    if (frameCount % 30 === 0) {
      ball.vx += random(-0.5, 0.5);
      ball.vy += random(-0.5, 0.5);
    }
    
    // Dampen
    ball.vx *= 0.99;
    ball.vy *= 0.99;
    
    // Keep on field
    ball.x = constrain(ball.x, 50, width - 50);
    ball.y = constrain(ball.y, 80, height - 80);
  } else if (scene === 2) {
    // Ball goes into goal
    let goalT = (t - 0.50) / 0.25;
    ball.x = lerp(width/2, width - 30, min(goalT * 2, 1));
    ball.y = height/2 + sin(goalT * PI * 2) * 50;
  } else {
    // Ball sits at goal
    ball.x = width - 30;
    ball.y = height/2;
  }
}

function drawBall() {
  push();
  translate(ball.x, ball.y);
  
  // Ball shadow
  fill(0, 50);
  noStroke();
  ellipse(3, 3, 22, 22);
  
  // Ball
  fill(255);
  stroke(180);
  strokeWeight(1);
  ellipse(0, 0, 22, 22);
  
  // Ball pattern (pentagon)
  fill(50);
  noStroke();
  beginShape();
  for (let i = 0; i < 5; i++) {
    let a = TWO_PI * i / 5 - PI/2;
    vertex(cos(a) * 6, sin(a) * 6);
  }
  endShape(CLOSE);
  
  pop();
}

function drawSceneOverlay(scene, t) {
  push();
  textAlign(CENTER, CENTER);
  
  if (scene === 0) {
    // Title overlay
    let alpha = min(frameCount * 5, 255);
    fill(255, alpha);
    textSize(36);
    textStyle(BOLD);
    text('AI WORLD CUP', width/2, 60);
    
    textSize(16);
    fill(200, alpha);
    text('OpenAI vs Anthropic vs xAI', width/2, 90);
    
    // Team labels
    fill(TEAM_A.color[0], TEAM_A.color[1], TEAM_A.color[2], alpha);
    textSize(14);
    text('OpenAI', 250, height - 40);
    
    fill(TEAM_B.color[0], TEAM_B.color[1], TEAM_B.color[2], alpha);
    text('Anthropic', 540, height - 40);
    
    fill(TEAM_C.color[0], TEAM_C.color[1], TEAM_C.color[2], alpha);
    text('xAI', 830, height - 40);
    
  } else if (scene === 1) {
    // Scoreboard
    fill(0, 150);
    noStroke();
    rect(width/2 - 100, 15, 200, 40, 5);
    
    fill(255);
    textSize(14);
    textStyle(BOLD);
    text('AI WORLD CUP', width/2, 35);
    
    // Match label
    let matchPhase = (t - 0.15) / 0.35;
    let labels = ['⚽ The Split', '⚡ The Lawsuit', '🏛️ Ideology War'];
    let label = labels[floor(matchPhase * 3) % 3];
    fill(255, 200, 100, 200);
    textSize(12);
    text(label, width/2, 55);
    
  } else if (scene === 2) {
    // Goal celebration
    let alpha = min((frameCount - 450) * 3, 255);
    fill(255, 215, 0, alpha);
    textSize(48);
    textStyle(BOLD);
    text('GOOOAL! ⚽', width/2, height/2 - 80);
    
    fill(255, alpha);
    textSize(20);
    text('Who scored? The AI war continues...', width/2, height/2 - 30);
    
  } else {
    // Final
    let alpha = min((frameCount - 675) * 3, 255);
    fill(255, alpha);
    textSize(28);
    textStyle(BOLD);
    text('The Trophy Awaits', width/2, height/2 - 80);
    
    fill(200, alpha * 0.8);
    textSize(16);
    text('Three giants. One goal. No rules.', width/2, height/2 - 40);
    
    // Credit
    fill(255, alpha * 0.5);
    textSize(12);
    textStyle(ITALIC);
    text('AI圈的9527', width/2, height - 20);
  }
  
  pop();
}
</script>
</body>
</html>
