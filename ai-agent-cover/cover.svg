<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <defs>
    <!-- Deep space gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d111f"/>
      <stop offset="100%" stop-color="#06080f"/>
    </radialGradient>

    <!-- Cube glow -->
    <radialGradient id="cubeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Beam gradient -->
    <linearGradient id="beamGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff6b35" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </linearGradient>

    <!-- Cube face gradients -->
    <linearGradient id="cubeFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0088cc" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="cubeTop" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="cubeSide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006699" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Agent glow -->
    <radialGradient id="agentGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="agentGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>

    <!-- Terminal line animation -->
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Dots pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#00d4ff" opacity="0.08"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.06"/>
    </pattern>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Line pattern for data flow -->
    <pattern id="dataLines" x="0" y="0" width="60" height="2" patternUnits="userSpaceOnUse">
      <line x1="0" y1="1" x2="40" y2="1" stroke="#00d4ff" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="383" fill="url(#bgGlow)"/>
  <rect width="900" height="383" fill="url(#grid)"/>
  <rect width="900" height="383" fill="url(#dots)"/>

  <!-- Subtle background lines -->
  <line x1="120" y1="0" x2="120" y2="383" stroke="#00d4ff" stroke-width="0.5" opacity="0.04"/>
  <line x1="480" y1="0" x2="480" y2="383" stroke="#00d4ff" stroke-width="0.5" opacity="0.04"/>
  <line x1="780" y1="0" x2="780" y2="383" stroke="#ff6b35" stroke-width="0.5" opacity="0.03"/>

  <!-- Decorative orbit ring -->
  <ellipse cx="500" cy="200" rx="200" ry="70" fill="none" stroke="#00d4ff" stroke-width="0.4" opacity="0.08" transform="rotate(-15 500 200)"/>
  <ellipse cx="500" cy="200" rx="260" ry="90" fill="none" stroke="#00d4ff" stroke-width="0.3" opacity="0.05" transform="rotate(-15 500 200)"/>

  <!-- ============ LEFT SIDE - NEGATIVE SPACE (for text overlay) ============ -->
  <!-- This area is intentionally kept clean -->

  <!-- ============ CENTER: GLOWING CUBE ============ -->

  <!-- Cube glow halo -->
  <ellipse cx="500" cy="210" rx="120" ry="100" fill="url(#cubeGlow)" filter="url(#glowSoft)"/>

  <!-- Cube - isometric 3D -->
  <!-- Front face -->
  <polygon points="500,165 560,195 560,245 500,215" fill="url(#cubeFront)" stroke="#00d4ff" stroke-width="0.8" opacity="0.8"/>
  <!-- Top face -->
  <polygon points="500,165 470,147 530,177 560,195" fill="url(#cubeTop)" stroke="#00d4ff" stroke-width="0.6" opacity="0.6"/>
  <!-- Right face -->
  <polygon points="560,195 530,177 530,227 560,245" fill="url(#cubeSide)" stroke="#00d4ff" stroke-width="0.6" opacity="0.4"/>

  <!-- Cube inner glow lines -->
  <line x1="500" y1="165" x2="560" y2="195" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="560" y1="195" x2="560" y2="245" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <line x1="500" y1="165" x2="500" y2="215" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="215" x2="560" y2="245" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <line x1="500" y1="165" x2="470" y2="147" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="470" y1="147" x2="530" y2="177" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <line x1="530" y1="177" x2="560" y2="195" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="530" y1="177" x2="530" y2="227" stroke="#00d4ff" stroke-width="0.6" opacity="0.2"/>

  <!-- Cube core point -->
  <circle cx="515" cy="200" r="2" fill="#00d4ff" filter="url(#glow)"/>

  <!-- ============ HOLOGRAPHIC CODE ON CUBE SURFACE ============ -->

  <!-- Code lines on front face -->
  <g opacity="0.5" font-family="'Courier New', monospace" font-size="5" fill="#00d4ff">
    <text x="508" y="190">def agent():</text>
    <text x="508" y="197">  ctx.run()</text>
    <text x="508" y="204">  return result</text>
  </g>

  <!-- Terminal window floating above -->
  <g opacity="0.25">
    <rect x="475" y="115" width="65" height="30" rx="2" fill="none" stroke="#00d4ff" stroke-width="0.4"/>
    <circle cx="479" cy="119" r="1.5" fill="#ff6b35"/>
    <circle cx="483" cy="119" r="1.5" fill="#00d4ff"/>
    <circle cx="487" cy="119" r="1.5" fill="#00d4ff"/>
    <text x="478" y="131" font-family="'Courier New', monospace" font-size="4" fill="#00d4ff" opacity="0.6">$ ./agent deploy</text>
    <text x="478" y="137" font-family="'Courier New', monospace" font-size="4" fill="#00d4ff" opacity="0.4">building...</text>
  </g>

  <!-- File tree floating right -->
  <g opacity="0.2" font-family="'Courier New', monospace" font-size="4" fill="#00d4ff">
    <text x="568" y="180">src/</text>
    <text x="572" y="186">agent.py</text>
    <text x="572" y="192">tools/</text>
    <text x="576" y="198">web.py</text>
    <text x="572" y="204">config.yaml</text>
  </g>

  <!-- ============ AGENT FIGURES ============ -->

  <!-- Agent 1 - top left (cyan) -->
  <circle cx="370" cy="140" r="18" fill="url(#agentGlow1)" opacity="0.15"/>
  <g transform="translate(370, 140)" filter="url(#glow)">
    <!-- Head -->
    <circle cx="0" cy="-8" r="5" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.9"/>
    <circle cx="0" cy="-8" r="1.5" fill="#00d4ff" opacity="0.8"/>
    <!-- Body -->
    <line x1="0" y1="-3" x2="0" y2="8" stroke="#00d4ff" stroke-width="1.2" opacity="0.8"/>
    <!-- Arms -->
    <line x1="0" y1="0" x2="-6" y2="5" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="0" x2="6" y2="5" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <!-- Legs -->
    <line x1="0" y1="8" x2="-4" y2="15" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="8" x2="4" y2="15" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Agent 2 - bottom (orange) -->
  <circle cx="650" cy="265" r="16" fill="url(#agentGlow2)" opacity="0.15"/>
  <g transform="translate(650, 265)" filter="url(#glow)">
    <circle cx="0" cy="-7" r="4.5" fill="none" stroke="#ff6b35" stroke-width="1.2" opacity="0.9"/>
    <circle cx="0" cy="-7" r="1.2" fill="#ff6b35" opacity="0.8"/>
    <line x1="0" y1="-2.5" x2="0" y2="7" stroke="#ff6b35" stroke-width="1.2" opacity="0.8"/>
    <line x1="0" y1="0.5" x2="-5" y2="4" stroke="#ff6b35" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="0.5" x2="5" y2="4" stroke="#ff6b35" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="7" x2="-3.5" y2="13" stroke="#ff6b35" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="7" x2="3.5" y2="13" stroke="#ff6b35" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Agent 3 - right (cyan) -->
  <circle cx="670" cy="160" r="15" fill="url(#agentGlow1)" opacity="0.12"/>
  <g transform="translate(670, 160)" filter="url(#glow)">
    <circle cx="0" cy="-7" r="4" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.9"/>
    <circle cx="0" cy="-7" r="1.2" fill="#00d4ff" opacity="0.8"/>
    <line x1="0" y1="-3" x2="0" y2="6" stroke="#00d4ff" stroke-width="1.2" opacity="0.8"/>
    <line x1="0" y1="0.5" x2="-5" y2="4" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="0.5" x2="5" y2="4" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="6" x2="-3" y2="12" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="6" x2="3" y2="12" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Agent 4 - top right small (cyan) -->
  <circle cx="650" cy="110" r="12" fill="url(#agentGlow1)" opacity="0.1"/>
  <g transform="translate(650, 110)" filter="url(#glow)">
    <circle cx="0" cy="-5" r="3.5" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
    <circle cx="0" cy="-5" r="1" fill="#00d4ff" opacity="0.7"/>
    <line x1="0" y1="-1.5" x2="0" y2="5" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="1" x2="-4" y2="3.5" stroke="#00d4ff" stroke-width="0.7" opacity="0.4"/>
    <line x1="0" y1="1" x2="4" y2="3.5" stroke="#00d4ff" stroke-width="0.7" opacity="0.4"/>
    <line x1="0" y1="5" x2="-2.5" y2="9" stroke="#00d4ff" stroke-width="0.7" opacity="0.4"/>
    <line x1="0" y1="5" x2="2.5" y2="9" stroke="#00d4ff" stroke-width="0.7" opacity="0.4"/>
  </g>

  <!-- ============ LIGHT BEAMS ============ -->

  <!-- Beam Agent 1 → Cube -->
  <line x1="383" y1="135" x2="490" y2="180" stroke="url(#beamGrad1)" stroke-width="1" opacity="0.5"/>
  <line x1="383" y1="135" x2="490" y2="180" stroke="#00d4ff" stroke-width="0.3" opacity="0.3" stroke-dasharray="2,4"/>

  <!-- Beam Agent 2 (orange) → Cube -->
  <line x1="635" y1="255" x2="535" y2="235" stroke="url(#beamGrad2)" stroke-width="1" opacity="0.5"/>
  <line x1="635" y1="255" x2="535" y2="235" stroke="#ff6b35" stroke-width="0.3" opacity="0.3" stroke-dasharray="2,4"/>

  <!-- Beam Agent 3 → Cube -->
  <line x1="658" y1="160" x2="548" y2="200" stroke="url(#beamGrad1)" stroke-width="0.8" opacity="0.4"/>
  <line x1="658" y1="160" x2="548" y2="200" stroke="#00d4ff" stroke-width="0.2" opacity="0.2" stroke-dasharray="3,5"/>

  <!-- Beam Agent 4 → Cube -->
  <line x1="640" y1="112" x2="530" y2="178" stroke="url(#beamGrad1)" stroke-width="0.6" opacity="0.3"/>

  <!-- ============ DATA FLOW PARTICLES ============ -->

  <!-- Particles along beams -->
  <circle cx="420" cy="155" r="1" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="450" cy="168" r="0.7" fill="#00d4ff" opacity="0.5"/>
  <circle cx="580" cy="245" r="1" fill="#ff6b35" opacity="0.6" filter="url(#glow)"/>
  <circle cx="600" cy="210" r="0.8" fill="#00d4ff" opacity="0.5"/>
  <circle cx="620" cy="185" r="0.6" fill="#00d4ff" opacity="0.4"/>

  <!-- Floating particles -->
  <circle cx="440" cy="240" r="0.7" fill="#00d4ff" opacity="0.3"/>
  <circle cx="580" cy="140" r="0.5" fill="#00d4ff" opacity="0.25"/>
  <circle cx="510" cy="260" r="0.6" fill="#ff6b35" opacity="0.2"/>
  <circle cx="680" cy="220" r="0.5" fill="#00d4ff" opacity="0.2"/>
  <circle cx="400" cy="190" r="0.4" fill="#00d4ff" opacity="0.3"/>

  <!-- ============ SUBTLE ORANGE ACCENT ============ -->

  <!-- Orange accent line bottom -->
  <line x1="440" y1="370" x2="500" y2="370" stroke="#ff6b35" stroke-width="1.5" opacity="0.3"/>
  <line x1="500" y1="370" x2="520" y2="370" stroke="#ff6b35" stroke-width="1.5" opacity="0.6"/>

  <!-- Small orange dot accent -->
  <circle cx="520" cy="370" r="2" fill="#ff6b35" opacity="0.5" filter="url(#glow)"/>

  <!-- ============ BOTTOM GLOW LINE ============ -->
  <line x1="350" y1="375" x2="550" y2="375" stroke="#00d4ff" stroke-width="0.5" opacity="0.08"/>
</svg>
