<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:900px;height:383px;overflow:hidden;background:#05080f;font-family:'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif}

  /* === Deep space background === */
  .bg{position:absolute;inset:0;background:
    radial-gradient(ellipse 120% 80% at 55% 50%,#0a1628 0%,transparent 70%),
    radial-gradient(circle 600px at 45% 45%,#0d1f3c 0%,transparent 60%),
    linear-gradient(180deg,#05080f 0%,#0a0e1a 100%)}

  /* === Subtle grid === */
  .grid{position:absolute;inset:0;opacity:.06;
    background-image:
      linear-gradient(rgba(0,255,220,.15) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,255,220,.15) 1px,transparent 1px);
    background-size:40px 40px}

  /* === Title area (left 1/3) === */
  .title-area{position:absolute;left:0;top:0;width:33%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:48px 36px;z-index:10}
  .title-area .tag{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#00ffc8;opacity:.7;margin-bottom:16px;font-weight:500}
  .title-area h1{font-size:36px;font-weight:700;color:#fff;line-height:1.2;letter-spacing:-.5px;margin-bottom:12px}
  .title-area h1 span{color:#00e5ff}
  .title-area .sub{font-size:13px;color:rgba(255,255,255,.45);line-height:1.5;font-weight:400}

  /* === Central server cube === */
  .cube-wrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5}

  .cube{position:relative;width:140px;height:140px;perspective:600px;animation:cubeFloat 6s ease-in-out infinite}
  @keyframes cubeFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

  .cube-face{position:absolute;width:140px;height:140px;border:1px solid rgba(0,255,220,.2);background:linear-gradient(135deg,rgba(0,255,220,.06) 0%,rgba(0,229,255,.03) 100%);backdrop-filter:blur(1px)}
  .cube-face.front{transform:translateZ(70px)}
  .cube-face.left{transform:rotateY(-90deg) translateZ(70px)}
  .cube-face.right{transform:rotateY(90deg) translateZ(70px)}
  .cube-face.top{transform:rotateX(90deg) translateZ(70px);border-color:rgba(0,255,220,.3)}

  /* Holographic code streams on cube faces */
  .hologram{position:absolute;inset:0;overflow:hidden}
  .hologram::before{content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(0deg,
      transparent 0px,transparent 3px,
      rgba(0,255,220,.12) 3px,rgba(0,255,220,.12) 4px),
    repeating-linear-gradient(90deg,
      transparent 0px,transparent 3px,
      rgba(0,229,255,.08) 3px,rgba(0,229,255,.08) 4px);
    animation:scanlines 8s linear infinite}
  @keyframes scanlines{0%{transform:translateY(-20px)}100%{transform:translateY(20px)}}

  .code-ticks{position:absolute;inset:0;overflow:hidden}
  .code-tick{position:absolute;width:60%;height:2px;border-radius:1px;
    background:linear-gradient(90deg,transparent,rgba(0,255,220,.5),rgba(0,229,255,.3),transparent);
    animation:tickFlow 3s ease-in-out infinite}
  .code-tick:nth-child(1){top:25%;left:10%;animation-delay:0s;width:50%}
  .code-tick:nth-child(2){top:45%;left:20%;animation-delay:.7s;width:55%}
  .code-tick:nth-child(3){top:65%;left:15%;animation-delay:1.4s;width:45%}
  .code-tick:nth-child(4){top:35%;left:30%;animation-delay:2.1s;width:40%}
  .code-tick:nth-child(5){top:55%;left:5%;animation-delay:.4s;width:65%}
  @keyframes tickFlow{0%{opacity:0;transform:translateX(-10px)}30%{opacity:1}100%{opacity:0;transform:translateX(30px)}}

  /* Cube glow ring */
  .glow-ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;
    background:radial-gradient(circle,rgba(0,255,220,.12) 0%,rgba(0,229,255,.04) 40%,transparent 70%);
    animation:ringPulse 4s ease-in-out infinite}
  @keyframes ringPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}}

  /* === Beam lines === */
  .beams{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:0;height:0;z-index:4}
  .beam{position:absolute;height:1.5px;transform-origin:left center;
    background:linear-gradient(90deg,rgba(0,255,220,.6),rgba(0,229,255,.2));
    animation:beamPulse 3s ease-in-out infinite;opacity:.5}
  .beam:nth-child(1){width:100px;top:0;transform:rotate(-35deg);animation-delay:0s}
  .beam:nth-child(2){width:90px;top:0;transform:rotate(25deg);animation-delay:.5s}
  .beam:nth-child(3){width:85px;top:0;transform:rotate(60deg);animation-delay:1s}
  .beam:nth-child(4){width:95px;top:0;transform:rotate(-65deg);animation-delay:1.5s}
  @keyframes beamPulse{0%,100%{opacity:.3;box-shadow:none}50%{opacity:.7;box-shadow:0 0 8px rgba(0,255,220,.4)}}

  /* === Agent figures (minimalist geometric people) === */
  .agent{position:absolute;z-index:6}
  .agent .head{width:14px;height:14px;border-radius:50%;margin:0 auto 4px}
  .agent .body{width:20px;height:30px;border-radius:6px;margin:0 auto}

  .agent:nth-child(1){left:62%;top:22%}
  .agent:nth-child(1) .head{background:radial-gradient(circle,#00ffc8,#00ffc888);box-shadow:0 0 12px #00ffc888,0 0 24px #00ffc833;animation:agentGlow 3s ease-in-out infinite .0s}
  .agent:nth-child(1) .body{background:linear-gradient(180deg,#00ffc888,#00ffc822);box-shadow:0 0 10px #00ffc844}

  .agent:nth-child(2){left:75%;top:55%}
  .agent:nth-child(2) .head{background:radial-gradient(circle,#00e5ff,#00e5ff88);box-shadow:0 0 12px #00e5ff88,0 0 24px #00e5ff33;animation:agentGlow 3s ease-in-out infinite .8s}
  .agent:nth-child(2) .body{background:linear-gradient(180deg,#00e5ff88,#00e5ff22);box-shadow:0 0 10px #00e5ff44}

  .agent:nth-child(3){left:30%;top:62%}
  .agent:nth-child(3) .head{background:radial-gradient(circle,#ff9100,#ff910088);box-shadow:0 0 12px #ff910088,0 0 24px #ff910033;animation:agentGlow 3s ease-in-out infinite 1.6s}
  .agent:nth-child(3) .body{background:linear-gradient(180deg,#ff910088,#ff910022);box-shadow:0 0 10px #ff910044}

  .agent:nth-child(4){left:68%;top:78%}
  .agent:nth-child(4) .head{background:radial-gradient(circle,#00ffc8,#00ffc888);box-shadow:0 0 12px #00ffc888,0 0 24px #00ffc833;animation:agentGlow 3s ease-in-out infinite 2.4s}
  .agent:nth-child(4) .body{background:linear-gradient(180deg,#00ffc888,#00ffc822);box-shadow:0 0 10px #00ffc844}

  @keyframes agentGlow{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.08);opacity:1}}

  /* === Connection dots on beams === */
  .dot{position:absolute;width:5px;height:5px;border-radius:50%;z-index:7;
    animation:dotPulse 2.5s ease-in-out infinite}
  .dot:nth-child(6){background:#00ffc8;box-shadow:0 0 6px #00ffc8;left:calc(50% + 50px);top:calc(50% - 35px);animation-delay:0s}
  .dot:nth-child(7){background:#00e5ff;box-shadow:0 0 6px #00e5ff;left:calc(50% + 45px);top:calc(50% + 25px);animation-delay:.5s}
  .dot:nth-child(8){background:#ff9100;box-shadow:0 0 6px #ff9100;left:calc(50% - 42px);top:calc(50% + 30px);animation-delay:1s}
  .dot:nth-child(9){background:#00ffc8;box-shadow:0 0 6px #00ffc8;left:calc(50% + 48px);top:calc(50% + 48px);animation-delay:1.5s}
  @keyframes dotPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.5);opacity:1}}

  /* === Orange warm accent dots === */
  .accent{position:absolute;border-radius:50%;z-index:3}
  .accent:nth-child(10){width:3px;height:3px;background:#ff9100;box-shadow:0 0 8px #ff910066;left:25%;top:40%;animation:accentFlicker 4s ease-in-out infinite .3s}
  .accent:nth-child(11){width:2px;height:2px;background:#ff6d00;box-shadow:0 0 6px #ff6d0044;left:78%;top:30%;animation:accentFlicker 5s ease-in-out infinite 1s}
  .accent:nth-child(12){width:2px;height:2px;background:#ffab40;box-shadow:0 0 6px #ffab4044;left:20%;top:70%;animation:accentFlicker 3.5s ease-in-out infinite 2s}
  @keyframes accentFlicker{0%,100%{opacity:.3}50%{opacity:.9}}

  /* === Floating data particles === */
  .particles{position:absolute;inset:0;z-index:2;overflow:hidden}
  .particle{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(0,255,220,.4);animation:particleDrift linear infinite}
  .particle:nth-child(1){left:40%;top:30%;animation-duration:12s;animation-delay:0s}
  .particle:nth-child(2){left:55%;top:60%;animation-duration:15s;animation-delay:2s}
  .particle:nth-child(3){left:48%;top:45%;animation-duration:10s;animation-delay:4s}
  .particle:nth-child(4){left:65%;top:35%;animation-duration:14s;animation-delay:1s}
  .particle:nth-child(5){left:38%;top:55%;animation-duration:11s;animation-delay:3s}
  .particle:nth-child(6){left:52%;top:50%;animation-duration:13s;animation-delay:5s}
  .particle:nth-child(7){left:60%;top:70%;animation-duration:16s;animation-delay:0.5s}
  .particle:nth-child(8){left:42%;top:25%;animation-duration:9s;animation-delay:6s}
  @keyframes particleDrift{
    0%{transform:translate(0,0);opacity:0}
    10%{opacity:.5}
    90%{opacity:.5}
    100%{transform:translate(var(--dx),var(--dy));opacity:0}
  }
  .particle:nth-child(1){--dx:40px;--dy:-30px}
  .particle:nth-child(2){--dx:-35px;--dy:-50px}
  .particle:nth-child(3){--dx:50px;--dy:20px}
  .particle:nth-child(4){--dx:-25px;--dy:40px}
  .particle:nth-child(5){--dx:30px;--dy:-45px}
  .particle:nth-child(6){--dx:-45px;--dy:15px}
  .particle:nth-child(7){--dx:20px;--dy:-55px}
  .particle:nth-child(8){--dx:-50px;--dy:30px}

  /* === Top right tiny branding === */
  .brand{position:absolute;right:30px;top:24px;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.2);text-transform:uppercase;z-index:10}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <div class="particles">
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div>
  </div>

  <div class="accent"></div><div class="accent"></div><div class="accent"></div>

  <div class="title-area">
    <div class="tag">AI AGENT</div>
    <h1>AI Agent<br><span>专属电脑</span></h1>
    <div class="sub">The Dedicated Machine</div>
  </div>

  <div class="cube-wrap">
    <div class="glow-ring"></div>
    <div class="beams">
      <div class="beam"></div>
      <div class="beam"></div>
      <div class="beam"></div>
      <div class="beam"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="cube">
      <div class="cube-face front"><div class="hologram"><div class="code-ticks"><div class="code-tick"></div><div class="code-tick"></div><div class="code-tick"></div><div class="code-tick"></div><div class="code-tick"></div></div></div></div>
      <div class="cube-face left"><div class="hologram"><div class="code-ticks"><div class="code-tick"></div><div class="code-tick"></div><div class="code-tick"></div><div class="code-tick"></div><div class="code-tick"></div></div></div></div>
      <div class="cube-face right"><div class="hologram"><div class="code-ticks"><div class="code-tick"></div><div class="code-tick"></div><div class="code-tick"></div><div class="code-tick"></div><div class="code-tick"></div></div></div></div>
      <div class="cube-face top"><div class="hologram"></div></div>
    </div>
  </div>

  <div class="agent"><div class="head"></div><div class="body"></div></div>
  <div class="agent"><div class="head"></div><div class="body"></div></div>
  <div class="agent"><div class="head"></div><div class="body"></div></div>
  <div class="agent"><div class="head"></div><div class="body"></div></div>

  <div class="brand">langchain sandbox</div>
</body>
</html>
